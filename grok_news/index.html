<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grokリアルタイム自動検索</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f0f4f8; color: #333; }
    h1 { color: #1a73e8; }
    #query { font-size: 1.1em; padding: 8px; width: 400px; border: 1px solid #ccc; border-radius: 6px; }
    #interval { font-size: 1.1em; padding: 8px; width: 100px; border: 1px solid #ccc; border-radius: 6px; }
    #results { margin-top: 20px; border: 1px solid #ddd; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 300px; }
    .loading { color: #777; font-style: italic; text-align: center; padding: 40px 0; }
    .error { color: #d93025; text-align: center; padding: 20px; }
    ul { list-style: none; padding: 0; }
    li { margin: 12px 0; padding: 12px; background: #f8fafc; border-radius: 6px; border-left: 4px solid #1a73e8; }
    li a { color: #1a73e8; text-decoration: none; font-weight: bold; }
    li a:hover { text-decoration: underline; }
    .snippet { color: #555; margin-top: 4px; font-size: 0.95em; }
    .info { font-size: 0.9em; color: #666; margin: 10px 0; }
    button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>
  <h1>Grokリアルタイム自動検索結果</h1>

  <label for="query">検索キーワード（URLに ?q=キーワード で自動検索）</label><br>
  <input type="text" id="query" placeholder="検索キーワードを入力" style="margin: 10px 0; width:400px; padding:8px;">

  <label for="interval">更新間隔（秒）: </label>
  <input type="number" id="interval" value="60" min="10" max="3600" style="width:80px; padding:8px;">秒

  <button onclick="startSearch()">開始/更新</button>

  <div id="results" class="loading">検索を開始します…</div>

  <p class="info">
    例: grok-search.html?q=最新のAIニュース&interval=30 で30秒自動更新  
    パラメーターなし → 手動検索モード
  </p>

  <script>
    let intervalId = null;

    function startSearch() {
      const queryInput = document.getElementById('query');
      const intervalInput = document.getElementById('interval');
      let query = queryInput.value.trim();
      let intervalSec = parseInt(intervalInput.value) || 60;

      // URLパラメーター優先
      const urlParams = new URLSearchParams(window.location.search);
      const urlQuery = urlParams.get('q');
      const urlInterval = parseInt(urlParams.get('interval'));

      if (urlQuery) query = decodeURIComponent(urlQuery);
      if (urlInterval && urlInterval >= 10 && urlInterval <= 3600) intervalSec = urlInterval;

      queryInput.value = query;
      intervalInput.value = intervalSec;

      if (!query) {
        document.getElementById('results').innerHTML = '<p class="error">キーワードを入力するか、URLに ?q=キーワード を付けてください</p>';
        return;
      }

      performSearch(query);

      // 自動更新（初回のみセット）
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(() => performSearch(query), intervalSec * 1000);
      alert(`自動更新を開始しました（${intervalSec}秒ごと）`);
    }

    async function performSearch(query) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="loading">Grokが検索中... 🚀</div>';

      try {
        // ここを本物のGrok APIに置き換え（今はダミー）
        const results = await fakeGrokSearch(query);

        let html = `<h3>「${query}」の最新結果</h3><ul>`;
        if (results.length === 0) {
          html += '<li>該当結果なし…もう少し待ってみよう！</li>';
        } else {
          results.forEach(item => {
            html += `
              <li>
                <a href="${item.url}" target="_blank">${item.title}</a>
                <div class="snippet">${item.snippet}</div>
              </li>`;
          });
        }
        html += '</ul>';
        html += '<p class="info">最終更新: ' + new Date().toLocaleTimeString() + '（自動更新中）</p>';

        resultsDiv.innerHTML = html;
      } catch (e) {
        resultsDiv.innerHTML = `<p class="error">エラー: ${e.message}</p>`;
      }
    }

    // ダミー検索関数（本番ではGrok APIに置き換え）
    async function fakeGrokSearch(query) {
      await new Promise(r => setTimeout(r, 1200)); // 遅延シミュレーション
      return [
        { title: `${query} 公式サイト`, url: 'https://example.com', snippet: '最新情報が満載です' },
        { title: `${query} 解説記事`, url: 'https://news.example.jp', snippet: 'わかりやすくまとめました' },
        { title: `Grokが答える ${query}`, url: 'https://grok.x.ai', snippet: 'Grokのリアルタイム見解' }
      ];
    }

    // ページ読み込み時にURLパラメーターがあれば自動開始
    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('q')) {
        startSearch();
      }
    };
  </script>
</body>
</html>
