name: AI Legion Heartbeat (Monitor)

on:
  schedule:
    - cron: '*/5 * * * *' # 5分ごとに自動起動
  workflow_dispatch:      # 手動での即時実行も可能にする

jobs:
  check-and-execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Legion Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python scripts/monitor_script.py # 先程のPythonプログラムを指定
